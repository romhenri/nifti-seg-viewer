<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NIfTI viewer</title>
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'&gt;&lt;text y='14' font-size='14'&gt;🧠&lt;/text&gt;&lt;/svg&gt;" />
  <style>
    html, body { margin: 0; height: 100%; background: #111; color: #eee; font-family: system-ui, sans-serif; }
    #controls { padding: 8px 12px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    #controls label { display: flex; gap: 6px; align-items: center; font-size: 13px; }
    #controls input[type=file] { color: #eee; font-size: 12px; }
    #gl { display: block; width: 100vw; height: calc(100vh - 48px); }
    button { background: #333; color: #eee; border: 1px solid #555; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
    button:hover { background: #444; }
    #hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #777; font-size: 14px; text-align: center; pointer-events: none; }
    #hint small { color: #555; }

    #opacityRow { display: none; }
    #opacityRow input[type=range] { width: 120px; }

    #legend { position: absolute; top: 56px; right: 12px; width: 210px; max-height: calc(100vh - 80px);
      overflow-y: auto; background: rgba(24, 24, 24, 0.92); border: 1px solid #444; border-radius: 6px;
      padding: 8px 10px; font-size: 13px; display: none; backdrop-filter: blur(2px); }
    #legend h3 { margin: 0 0 6px; font-size: 12px; font-weight: 600; color: #bbb;
      text-transform: uppercase; letter-spacing: 0.04em; }
    #legendActions { display: flex; gap: 6px; margin-bottom: 8px; }
    #legendActions button { flex: 1; padding: 3px 0; font-size: 12px; }
    .legend-row { display: flex; gap: 8px; align-items: center; padding: 3px 2px; cursor: pointer;
      border-radius: 4px; user-select: none; }
    .legend-row:hover { background: rgba(255, 255, 255, 0.06); }
    .legend-row input[type=checkbox] { margin: 0; cursor: pointer; }
    .legend-row.off .legend-name, .legend-row.off .swatch { opacity: 0.4; }
    .swatch { width: 14px; height: 14px; border-radius: 3px; flex: 0 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.25); }
    .legend-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <div id="controls">
    <label>Base: <input type="file" id="baseFile" accept=".nii,.nii.gz" /></label>
    <label>Overlay: <input type="file" id="overlayFile" accept=".nii,.nii.gz" /></label>
    <label>Slice type:
      <select id="sliceType">
        <option value="0">Axial</option>
        <option value="1">Coronal</option>
        <option value="2">Sagittal</option>
        <option value="3" selected>Multiplanar</option>
        <option value="4">Render</option>
      </select>
    </label>
    <label id="opacityRow">Overlay opacity:
      <input type="range" id="opacity" min="0" max="100" value="60" />
    </label>
  </div>
  <canvas id="gl"></canvas>

  <div id="legend">
    <h3>Segmentation labels</h3>
    <div id="legendActions">
      <button id="allOn" type="button">All</button>
      <button id="allOff" type="button">None</button>
    </div>
    <div id="legendList"></div>
  </div>

  <div id="hint">
    Load a base NIfTI volume to start<br />
    <small>Everything runs locally &mdash; your data never leaves the browser.</small>
  </div>

  <script src="https://unpkg.com/@niivue/niivue@0.69.0/dist/niivue.umd.js"></script>
  <script>
    const { Niivue } = niivue;
    const nv = new Niivue({ backColor: [0.07, 0.07, 0.07, 1], show3Dcrosshair: true });
    nv.attachTo('gl');

    const hint = document.getElementById('hint');
    const hideHint = () => { hint.style.display = 'none'; };

    const sliceMap = { 0: nv.sliceTypeAxial, 1: nv.sliceTypeCoronal, 2: nv.sliceTypeSagittal, 3: nv.sliceTypeMultiplanar, 4: nv.sliceTypeRender };
    document.getElementById('sliceType').addEventListener('change', (e) => {
      nv.setSliceType(sliceMap[e.target.value]);
    });
    nv.setSliceType(nv.sliceTypeMultiplanar);

    // 20 visually distinct categorical colors (Sasha Trubetskoy's palette).
    const PALETTE = [
      [230, 25, 75], [60, 180, 75], [255, 225, 25], [0, 130, 200], [245, 130, 48],
      [145, 30, 180], [70, 240, 240], [240, 50, 230], [210, 245, 60], [250, 190, 212],
      [0, 128, 128], [220, 190, 255], [170, 110, 40], [255, 250, 200], [128, 0, 0],
      [170, 255, 195], [128, 128, 0], [255, 215, 180], [0, 0, 128], [128, 128, 128],
    ];
    // Above this many distinct values we assume the overlay is a continuous
    // image, not a discrete label map, and fall back to a smooth colormap.
    const MAX_LABELS = 64;
    const DEFAULT_OPACITY = 0.6;

    // Current segmentation overlay state.
    //   seg = { vol, labels: [{ value, name, color: [r,g,b], on }] }
    let seg = null;
    let overlayVol = null; // the loaded overlay NVImage (label map or continuous)

    const legend = document.getElementById('legend');
    const legendList = document.getElementById('legendList');
    const opacityRow = document.getElementById('opacityRow');
    const opacitySlider = document.getElementById('opacity');

    function fileToVolume(file, opts = {}) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve({ name: file.name, buffer: reader.result, ...opts });
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }

    // Collect the unique integer label values (scaled intensities > 0) in a
    // volume. Returns null when the data looks continuous rather than discrete.
    function detectLabels(vol) {
      const img = vol.img;
      const slope = vol.hdr.scl_slope || 1;
      const inter = vol.hdr.scl_inter || 0;
      const seen = new Set();
      for (let i = 0; i < img.length; i++) {
        const v = img[i] * slope + inter;
        if (v <= 0) continue;
        if (Math.abs(v - Math.round(v)) > 1e-3) return null; // non-integer => continuous
        seen.add(Math.round(v));
        if (seen.size > MAX_LABELS) return null;
      }
      return seen.size ? [...seen].sort((a, b) => a - b) : null;
    }

    // Build a niivue label colormap from the current seg state. Index 0 is a
    // transparent background; disabled labels get alpha 0 so they vanish.
    function buildColormap(labels) {
      const R = [0], G = [0], B = [0], A = [0], I = [0], names = ['background'];
      for (const l of labels) {
        R.push(l.color[0]); G.push(l.color[1]); B.push(l.color[2]);
        A.push(l.on ? 255 : 0);
        I.push(l.value);
        names.push(l.name);
      }
      return { R, G, B, A, I, labels: names };
    }

    function applySeg() {
      if (!seg) return;
      seg.vol.setColormapLabel(buildColormap(seg.labels));
      nv.updateGLVolume();
    }

    const rgbCss = (c) => 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')';

    function renderLegend() {
      legendList.innerHTML = '';
      if (!seg) { legend.style.display = 'none'; return; }
      for (const l of seg.labels) {
        const row = document.createElement('label');
        row.className = 'legend-row' + (l.on ? '' : ' off');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = l.on;
        cb.addEventListener('change', () => {
          l.on = cb.checked;
          row.classList.toggle('off', !l.on);
          applySeg();
        });

        const sw = document.createElement('span');
        sw.className = 'swatch';
        sw.style.background = rgbCss(l.color);

        const name = document.createElement('span');
        name.className = 'legend-name';
        name.textContent = l.name;

        row.append(cb, sw, name);
        legendList.appendChild(row);
      }
      legend.style.display = 'block';
    }

    function setAll(on) {
      if (!seg) return;
      seg.labels.forEach((l) => { l.on = on; });
      applySeg();
      renderLegend();
    }
    document.getElementById('allOn').addEventListener('click', () => setAll(true));
    document.getElementById('allOff').addEventListener('click', () => setAll(false));

    opacitySlider.addEventListener('input', () => {
      if (!overlayVol) return;
      const idx = nv.volumes.indexOf(overlayVol);
      if (idx >= 0) nv.setOpacity(idx, opacitySlider.value / 100);
    });

    function clearOverlayState() {
      seg = null;
      overlayVol = null;
      opacityRow.style.display = 'none';
      renderLegend();
    }

    document.getElementById('baseFile').addEventListener('change', async (e) => {
      const f = e.target.files[0]; if (!f) return;
      try {
        const vol = await fileToVolume(f, { colormap: 'gray', opacity: 1 });
        await nv.loadVolumes([vol]); // replaces every volume, including overlays
        clearOverlayState();
        hideHint();
      } catch (err) {
        alert('Could not load base volume: ' + err.message);
      }
    });

    document.getElementById('overlayFile').addEventListener('change', async (e) => {
      const f = e.target.files[0]; if (!f) return;
      if (nv.volumes.length === 0) {
        alert('Load a base volume first.');
        e.target.value = '';
        return;
      }
      try {
        // Drop any previous overlay so re-selecting replaces rather than stacks.
        while (nv.volumes.length > 1) {
          nv.removeVolumeByIndex(nv.volumes.length - 1);
        }
        clearOverlayState();

        const overlay = await fileToVolume(f, { colormap: 'gray', opacity: DEFAULT_OPACITY });
        await nv.addVolume(overlay);
        overlayVol = nv.volumes[nv.volumes.length - 1];

        const values = detectLabels(overlayVol);
        if (values) {
          seg = {
            vol: overlayVol,
            labels: values.map((v, i) => ({
              value: v,
              name: 'Label ' + v,
              color: PALETTE[i % PALETTE.length],
              on: true,
            })),
          };
          applySeg();
          renderLegend();
        } else {
          // Continuous overlay: keep the classic smooth heat colormap.
          overlayVol.colormap = 'redyell';
          nv.updateGLVolume();
        }

        opacitySlider.value = Math.round(DEFAULT_OPACITY * 100);
        opacityRow.style.display = 'flex';
        hideHint();
      } catch (err) {
        alert('Could not load overlay: ' + err.message);
      }
    });
  </script>
</body>
</html>
